name: Playwright Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read
  issues: write

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # 1. Setup .NET (for your Marketplace app)
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Debug Folder Structure
        run: ls -R

      - name: Build .NET Project
        run: dotnet build ETSU-Marketplace/ETSU-Marketplace.csproj

      # 2. Setup Node.js (for Playwright)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci
        working-directory: ETSU-Marketplace

      - name: Install Playwright Browsers
        run: npx playwright install chromium --with-deps
        working-directory: ETSU-Marketplace

      # 3. Run Tests
      - name: Run Playwright tests
        run: npx playwright test --project=chromium
        working-directory: ETSU-Marketplace

      # 4. Upload Playwright report
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: ETSU-Marketplace/playwright-report/
          retention-days: 30

      # 5. Create GitHub issue only if tests fail on push
      - name: Create GitHub issue if tests fail
        if: ${{ failure() && github.event_name == 'push' }}
        uses: actions/github-script@v8
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branch = context.ref.replace('refs/heads/', '');
            const sha = context.sha;
            const runUrl = `https://github.com/${owner}/${repo}/actions/runs/${context.runId}`;
            const title = `Playwright test failure on ${branch}`;

            const existing = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open'
            });

            const alreadyOpen = existing.data.some(issue => issue.title === title);

            if (!alreadyOpen) {
              await github.rest.issues.create({
                owner,
                repo,
                title,
                body: [
                  `Automated Playwright tests failed after a push.`,
                  ``,
                  `- Branch: ${branch}`,
                  `- Commit: ${sha}`,
                  `- Workflow: ${context.workflow}`,
                  `- Run: ${runUrl}`,
                  ``,
                  `Please review the failed workflow run and fix the issue.`
                ].join('\n')
              });
            }