services:
  web:
    image: ghcr.io/sullinsje/etsu-marketplace:latest
    container_name: etsu-marketplace-app
    env_file:
      - /home/ubuntu/github.env
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Data Source=Data/Data.db
    volumes:
      - marketplace-data:/app/Data
      - marketplace-images:/app/wwwroot/images/listings
    restart: unless-stopped
    networks:
      - marketplace-net

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus-service
    volumes:
      - /home/ubuntu/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - marketplace-net
    depends_on:
      - web
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana-service
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-storage:/var/lib/grafana
    networks:
      - marketplace-net
    depends_on:
      - prometheus
    restart: unless-stopped

  nginx:
    image: nginx:latest
    container_name: nginx-service
    ports:
      - "80:80"
    volumes:
      - /home/ubuntu/nginx.conf:/etc/nginx/nginx.conf
    networks:
      - marketplace-net
    depends_on:
      - web
    restart: unless-stopped

volumes:
  marketplace-data:
  marketplace-images:
  grafana-storage:

networks:
  marketplace-net:
    driver: bridge
