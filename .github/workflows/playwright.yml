name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    # 1. Build and Start the App using Docker
    - name: Build and Start Container
      run: |
        docker compose build
        docker compose up -d
      working-directory: ETSU-Marketplace

    # 2. DevSecOps: Simple Container Scan (Optional but recommended)
    - name: Check Container Status
      run: docker ps

    # 3. Setup Node.js (for Playwright)
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install dependencies
      # Change this path to match where your package.json is
      run: npm ci
      working-directory: ETSU-Marketplace 

    - name: Install Playwright Browsers
      run: npx playwright install chromium --with-deps
      working-directory: ETSU-Marketplace

    # 4. Run Tests
    - name: Run Playwright tests
      run: npx playwright test --project=chromium
      working-directory: ETSU-Marketplace

    # 5. Cleanup
    - name: Stop Containers
      if: always()
      run: docker compose down
      working-directory: ETSU-Marketplace

    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: ETSU-Marketplace/playwright-report/
        retention-days: 30
