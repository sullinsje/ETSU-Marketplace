name: Build and Push to GHCR

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Use the exact same build logic that works in Playwright
      - name: Build and Tag Image
        # This bash trick converts the repository name to lowercase
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          docker build -t ghcr.io/${REPO_LOWER}:latest ./ETSU-Marketplace
          docker tag ghcr.io/${REPO_LOWER}:latest ghcr.io/${REPO_LOWER}:main
          
          # Store it in an env var so the next step can see it too
          echo "REPO_LOWER=${REPO_LOWER}" >> $GITHUB_ENV

      - name: Push Image to GHCR
        run: |
          docker push ghcr.io/${{ env.REPO_LOWER }}:latest
          docker push ghcr.io/${{ env.REPO_LOWER }}:main
