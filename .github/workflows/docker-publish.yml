name: Build and Push to GHCR

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Use the exact same build logic that works in Playwright
      - name: Build and Tag Image
        run: |
          docker build -t ghcr.io/${{ github.repository }}:latest ./ETSU-Marketplace
          docker tag ghcr.io/${{ github.repository }}:latest ghcr.io/${{ github.repository }}:main

      - name: Push Image to GHCR
        run: |
          docker push ghcr.io/${{ github.repository }}:latest
          docker push ghcr.io/${{ github.repository }}:main
